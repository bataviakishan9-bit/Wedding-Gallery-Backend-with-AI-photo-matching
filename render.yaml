services:
  # 1. The Node.js Web API
  - type: web
    name: magic-gallery-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false

databases:
  # 2. The PostgreSQL Database with pgvector
  - name: magic-gallery-db
    databaseName: wedding_gallery
    user: postgres
    plan: starter
    region: oregon
    postgresSQLVersion: "15"
