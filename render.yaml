services:
  # 1. The PostgreSQL Database
  - type: psql
    name: magic-gallery-db
    plan: starter # Required for pgvector extension
    ipAllowList: [] # Allows internal connections only for security

  # 2. The Node.js Web API
  - type: web
    name: magic-gallery-api
    env: node
    plan: starter # Starter gives 512MB RAM, needed to load AI models
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magic-gallery-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # You will add these manually in the Render Dashboard later:
      # - ANTHROPIC_API_KEY
      # - GOOGLE_CREDENTIALS_JSON
